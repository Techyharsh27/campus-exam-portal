services:
  # Backend API
  - type: web
    name: campus-portal-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: campus-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: campus-portal-web
          property: url

  # Frontend Static Site
  - type: web
    name: campus-portal-web
    env: static
    buildCommand: npm install && npm run build
    staticPublishDir: dist

databases:
  - name: campus-portal-db
    plan: free
